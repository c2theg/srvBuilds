#  By: Christopher Gray  |  Updated: 5/25/2026  |  Version 0.1.1  |  https://github.com/c2theg
#  Purpose: Static IPv4/IPv6 assignment with VLAN — generic template
#  For: Ubuntu 26.04 Server (LTS)
#
# -------------------------------------------------------
#  SETUP STEPS
# -------------------------------------------------------
#
#  1) Identify your interface name and MAC address:
#       ip a
#       ip route | grep default
#
#  2) Backup the old config:
#       sudo cp /etc/netplan/<old-file> /root/<old-file>.backup
#
#  3) Edit this file — replace all <PLACEHOLDERS>:
#       sudo nano /etc/netplan/netplan-2604-vlans.yaml
#
#  4) Set correct permissions:
#       sudo chmod 600 /etc/netplan/netplan-2604-vlans.yaml
#
#  5) Test before applying:
#       sudo netplan try           (applies for 60s, auto-reverts on failure)
#       sudo netplan --debug generate  (syntax check only)
#
#  6) Apply if test passed:
#       sudo netplan apply
#
#  7) Verify:
#       ping 1.1.1.1     (IP resolution)
#       ping x.co        (DNS resolution)
#
# -------------------------------------------------------
#  COMMON INTERFACE NAMES
#    ens33     — VMware (older)
#    ens160    — VMware (newer)
#    enp0s3    — VirtualBox
#    eno4      — Dell servers
#    eth0      — generic
#
# -------------------------------------------------------
#  DNS OPTIONS (pick 3, systemd-resolved ignores beyond that)
#    Security/filtering:
#      NextDNS:             45.90.30.148, 45.90.28.148
#      Cloudflare Families: 1.1.1.3, 1.0.0.3
#      OpenDNS Family:      208.67.222.123, 208.67.220.123
#      Quad9:               9.9.9.9, 149.112.112.112
#    No filtering:
#      Cloudflare:          1.1.1.1, 1.0.0.1
#      Google:              8.8.8.8, 8.8.4.4
#
# -------------------------------------------------------
#  DEBUGGING
#    sudo netplan --debug apply
#    sudo systemd-resolve --status          (verify DNS servers are active)
#    resolvectl query x.co                  (test DNS resolution)
#
#  Errors:
#    "Permissions too open"  →  sudo chmod 600 /etc/netplan/*.yaml
#    "Inconsistent indentation"  →  sed 's/ /./g' <file>  (reveals tabs vs spaces)
#
# -------------------------------------------------------

network:
  version: 2
  renderer: networkd
  ethernets:
    <INTERFACE>:                     # e.g. enp193s0, ens160, eno4
      dhcp4: false
      dhcp6: false
      match:
        macaddress: <MAC_ADDRESS>    # e.g. 78:55:36:08:f2:d6  (from: ip a)

  vlans:
    vlan<VLAN_ID>:                   # e.g. vlan200
      id: <VLAN_ID>                  # e.g. 200
      link: <INTERFACE>              # must match ethernet key above
      addresses:
        - <IP_ADDRESS>/<PREFIX>      # e.g. 10.50.1.10/24
      routes:
        - to: default
          via: <GATEWAY>             # e.g. 10.50.1.1
          metric: 100
      dhcp6: true                    # remove if IPv6 not needed
      nameservers:
        addresses:
          - <GATEWAY>                # local router first (handles LAN hostnames)
          - 45.90.30.148             # NextDNS primary
          - 1.0.0.3                  # OpenDNS secondary
        search:
          - home.lan                 # local domain (remove if not using local DNS)
      optional: true                 # prevents boot delay if network is slow
