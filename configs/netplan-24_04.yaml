#	Version 0.0.21
#	For: Ubuntu 24.04 Server (LTS)+  (and 26.04)
#	Quick Download: 
#		wget -O "netplan-24_04.yaml" https://bit.ly/4bnv0oy
# -------------------------------------------------------
#	1) First identify the interface name (like ens33, eth0, enp0s3,  eno4 (Dell Servers), ens160 (VMWare), enp0s3, etc.).
#		ip a
#	2) ls /etc/netplan/
#
#	3) Override the config with bellow
#		sudo nano 01-netcfg.yaml
#		- save and close
#	4) Apply Settings
#		sudo netplan apply
#	5) ping 1.1.1.1
#	6) ping google.com
#
# -------------------------------------------------------
#   Cloudflare Family Sheild, OpenDNS Family - (Servers dont need to access porn!) - 208.67.222.123, 1.1.1.3, 9.9.9.9, 2606:4700:4700::1113, 2620:119:35::123, 2620:fe::fe
#     Both IPv4 and IPv6
#
#  List of Non-Security Focused DNS Providers:
#       208.67.222.222, 1.1.1.1, 8.8.8.8, 2001:4860:4860::8888, 2620:0:ccc::2, 2606:4700:4700::1111
#
#  Install:
#     wget -O "netplan-24_04.yaml" https://raw.githubusercontent.com/c2theg/srvBuilds/refs/heads/master/configs/netplan-24_04.yaml
#	  mv 01-netcfg.yaml /etc/netplan/netplan-24_04.yaml
#     cd /etc/netplan/
#
# -------------------------------------------------------
# Source: https://netplan.io/examples
#
# renderer: "networkd" or "NetworkManager"
#
# DEBUG: sudo netplan --debug apply
#  or apply it with:   netplan apply
#
#  if you get error: ' Permissions for /etc/netplan/01-network-manager-all.yaml are too open. Netplan configuration should NOT be accessible by others.' 
#	sudo chmod 600 /etc/netplan/01-network-manager-all.yaml
#
#	If you get the error "inconsistant indentation"
#		sed 's/ /./g' 50-cloud-init.yaml
#
#	routes:
#	··- to: default
#	····via: 192.168.1.1
# -------------------------------------------------------
network:
  version: 2
#  renderer: networkd
  ethernets:
  # ens160: # VMWARE
  # ens18: # ubuntu 26.04
    eno4:
     dhcp4: false
     addresses: [10.50.1.44/24]
     routes:
        - to: default
          via: 10.50.1.1
     nameservers:
       addresses: [10.50.1.1, 208.67.222.123, 1.1.1.3, 9.9.9.9, 2606:4700:4700::1113, 2620:119:35::123, 2620:fe::fe, 8.8.8.8]
